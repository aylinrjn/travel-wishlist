<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Travel Wishlist</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #f4f1eb;
      --white:    #ffffff;
      --text:     #1a1815;
      --text2:    #7a756e;
      --text3:    #b0aa9f;
      --gold:     #9a7a30;
      --gold-lt:  #c9a84c;
      --blue:     #3b82f6;
      --green:    #16a34a;
      --shadow:   0 1px 3px rgba(0,0,0,.06), 0 6px 20px rgba(0,0,0,.07);
      --shadow-h: 0 2px 6px rgba(0,0,0,.07), 0 16px 40px rgba(0,0,0,.12);
      --radius:   14px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Georgia','Times New Roman',serif; }

    /* HERO */
    .hero { text-align: center; padding: 80px 24px 56px; }
    .hero-eye { display: inline-block; font-size: .68rem; text-transform: uppercase; letter-spacing: .3em; color: var(--gold); border: 1px solid rgba(154,122,48,.35); padding: 5px 16px; border-radius: 20px; margin-bottom: 22px; font-family: system-ui, sans-serif; }
    .hero h1 { font-size: clamp(2.4rem,6vw,5rem); font-weight: normal; color: var(--text); letter-spacing: -.01em; margin-bottom: 12px; }
    .hero-sub { font-size: .85rem; color: var(--text3); letter-spacing: .18em; text-transform: uppercase; font-family: system-ui, sans-serif; }
    .stats { display: flex; gap: 48px; justify-content: center; margin-top: 44px; flex-wrap: wrap; }
    .stat-n { font-size: 2.2rem; color: var(--text); line-height: 1; }
    .stat-l { font-size: .62rem; text-transform: uppercase; letter-spacing: .18em; color: var(--text3); margin-top: 5px; font-family: system-ui, sans-serif; }

    /* CONTROLS */
    .controls { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 20px 4px; flex-wrap: wrap; }
    .btn { padding: 8px 20px; border-radius: 30px; border: 1px solid; background: transparent; font-size: .72rem; font-family: system-ui, sans-serif; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    .btn-all  { border-color: rgba(26,24,21,.2);   color: var(--text2); }
    .btn-reg  { border-color: rgba(59,130,246,.35); color: var(--blue); }
    .btn-lux  { border-color: rgba(154,122,48,.4);  color: var(--gold); }
    .btn-all.active  { background: var(--text);  border-color: var(--text);  color: #fff; }
    .btn-reg.active  { background: var(--blue);  border-color: var(--blue);  color: #fff; }
    .btn-lux.active  { background: var(--gold);  border-color: var(--gold);  color: #fff; }
    .sep { width: 1px; height: 20px; background: rgba(0,0,0,.12); }
    .btn-view { border-color: rgba(0,0,0,.15); color: var(--text2); padding: 8px 16px; }
    .btn-view.active { background: var(--white); border-color: rgba(0,0,0,.2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    /* MAP */
    #map-wrap { display: none; padding: 16px 36px; max-width: 1360px; margin: 0 auto; }
    #map-wrap.visible { display: block; }
    #map { height: 580px; border-radius: var(--radius); border: 1px solid rgba(0,0,0,.08); overflow: hidden; box-shadow: var(--shadow); }
    .pin { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; cursor: pointer; border: 2px solid rgba(255,255,255,.8); box-shadow: 0 2px 8px rgba(0,0,0,.2); transition: transform .2s; }
    .pin:hover { transform: scale(1.15); }
    .pin-reg  { background: var(--blue); }
    .pin-lux  { background: var(--gold-lt); width: 40px; height: 40px; font-size: 19px; }
    .pin-bkd  { background: var(--green); }
    .leaflet-popup-content-wrapper { background: #fff !important; border: 1px solid rgba(0,0,0,.08) !important; border-radius: 12px !important; box-shadow: 0 4px 20px rgba(0,0,0,.12) !important; color: var(--text) !important; }
    .leaflet-popup-tip { background: #fff !important; }
    .leaflet-popup-content { margin: 14px 18px !important; font-family: 'Georgia',serif; text-align: center; }

    /* SECTION DIVIDER */
    .divider { display: flex; align-items: center; gap: 16px; padding: 32px 36px 12px; max-width: 1360px; margin: 0 auto; }
    .divider-line { flex: 1; height: 1px; background: rgba(0,0,0,.1); }
    .divider-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .22em; color: var(--text3); white-space: nowrap; font-family: system-ui, sans-serif; }
    .divider.lux .divider-line { background: rgba(154,122,48,.25); }
    .divider.lux .divider-label { color: var(--gold); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; padding: 0 36px 14px; max-width: 1360px; margin: 0 auto; }

    /* CARD */
    .card { border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--white); box-shadow: var(--shadow); transition: transform .28s cubic-bezier(.22,.68,0,1.2), box-shadow .28s; position: relative; }
    .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-h); }
    .card.booked { outline: 2px solid var(--green); outline-offset: 0px; }

    .card-photo { position: relative; aspect-ratio: 3/4; overflow: hidden; }
    .card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .55s cubic-bezier(.22,.68,0,1); filter: brightness(.96) saturate(.88); }
    .card:hover .card-photo img { transform: scale(1.04); }

    /* photo overlay — only at bottom for text */
    .card-photo-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 45%, rgba(0,0,0,.18) 65%, rgba(0,0,0,.72) 100%); }

    /* text anchored to bottom of photo */
    .card-photo-text { position: absolute; bottom: 16px; left: 18px; right: 52px; }
    .card-flag-country { font-size: .65rem; text-transform: uppercase; letter-spacing: .14em; color: rgba(255,255,255,.7); margin-bottom: 4px; font-family: system-ui, sans-serif; }
    .card-name { font-size: 1.45rem; font-weight: normal; color: #fff; line-height: 1.15; }

    /* action buttons — bottom right of photo */
    .card-actions { position: absolute; bottom: 14px; right: 14px; display: flex; flex-direction: column; gap: 6px; }
    .act { width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(255,255,255,.18); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.9); transition: all .2s; }
    .act:hover { background: rgba(255,255,255,.35); transform: scale(1.1); }
    .act.heart.on { background: rgba(220,50,50,.65); color: #fff; }
    .act.plane.on { background: rgba(22,163,74,.65); color: #fff; }

    /* luxury badge */
    .lux-badge { position: absolute; top: 12px; left: 12px; background: var(--gold-lt); color: #fff; font-size: .58rem; text-transform: uppercase; letter-spacing: .1em; padding: 4px 10px; border-radius: 20px; font-family: system-ui, sans-serif; }

    /* booked strip under photo */
    .booked-strip { display: none; background: #f0fdf4; border-bottom: 1px solid #d1fae5; padding: 7px 18px; font-size: .7rem; color: var(--green); font-family: system-ui, sans-serif; letter-spacing: .05em; }
    .card.booked .booked-strip { display: block; }

    /* card info strip */
    .card-info { padding: 14px 18px 16px; display: flex; align-items: center; justify-content: space-between; }
    .budget-dots { display: flex; gap: 3px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
    .dot.off { background: rgba(0,0,0,.12); }
    .card-time { font-size: .65rem; color: var(--text3); font-family: system-ui, sans-serif; }

    /* MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); border-radius: 20px; max-width: 660px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(20px) scale(.97); transition: transform .28s cubic-bezier(.22,.68,0,1.2); scrollbar-width: thin; }
    .overlay.open .modal { transform: none; }

    .modal-photo { position: relative; aspect-ratio: 16/9; overflow: hidden; border-radius: 20px 20px 0 0; }
    .modal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(.96) saturate(.88); }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.9); border: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: var(--text); z-index: 1; transition: background .2s; }
    .modal-close:hover { background: #fff; }

    .modal-body { padding: 28px 30px 36px; }
    .m-flag { font-size: 1.8rem; margin-bottom: 10px; }
    .m-title { font-size: 1.9rem; font-weight: normal; margin-bottom: 3px; }
    .m-country { font-size: .7rem; text-transform: uppercase; letter-spacing: .16em; color: var(--text3); margin-bottom: 18px; font-family: system-ui, sans-serif; }
    .m-desc { font-size: .93rem; line-height: 1.8; color: var(--text2); margin-bottom: 24px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .ib { background: var(--bg); border-radius: 10px; padding: 13px 15px; }
    .ib.gold { background: #fdf8ee; border: 1px solid rgba(154,122,48,.15); }
    .ib-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .18em; color: var(--text3); margin-bottom: 4px; font-family: system-ui, sans-serif; }
    .ib-val { font-size: .85rem; color: var(--text); line-height: 1.4; }
    .ib-val small { display: block; font-size: .72rem; color: var(--text3); margin-top: 2px; font-family: system-ui, sans-serif; }

    .hl-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .2em; color: var(--text3); margin-bottom: 11px; font-family: system-ui, sans-serif; }
    .highlights { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .highlights li { display: flex; gap: 11px; font-size: .87rem; line-height: 1.55; color: var(--text2); }
    .highlights li::before { content: '→'; color: var(--gold); flex-shrink: 0; margin-top: 2px; }

    /* BOOKING */
    #book-ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
    #book-ov.open { opacity: 1; pointer-events: all; }
    .book-box { background: #fff; border-radius: 18px; padding: 30px 26px; max-width: 360px; width: 100%; transform: scale(.96); transition: transform .22s cubic-bezier(.22,.68,0,1.2); text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
    #book-ov.open .book-box { transform: none; }
    .book-flag { font-size: 2.2rem; margin-bottom: 8px; }
    .book-name { font-size: 1.3rem; font-weight: normal; margin-bottom: 3px; }
    .book-sub { font-size: .7rem; text-transform: uppercase; letter-spacing: .12em; color: var(--text3); margin-bottom: 22px; font-family: system-ui, sans-serif; }
    .book-row { display: flex; gap: 10px; margin-bottom: 18px; }
    .book-row select { flex: 1; background: var(--bg); border: 1px solid rgba(0,0,0,.12); border-radius: 9px; color: var(--text); font-family: inherit; font-size: .88rem; padding: 10px 12px; cursor: pointer; outline: none; }
    .book-row select:focus { border-color: var(--gold); }
    .book-ok { width: 100%; padding: 12px; border-radius: 10px; background: var(--text); color: #fff; border: none; font-family: system-ui, sans-serif; font-size: .82rem; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; transition: opacity .2s; }
    .book-ok:hover { opacity: .85; }
    .book-no { background: none; border: none; color: var(--text3); font-family: system-ui, sans-serif; font-size: .75rem; cursor: pointer; text-transform: uppercase; letter-spacing: .1em; }

    footer { text-align: center; padding: 50px 20px 36px; color: var(--text3); font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; font-family: system-ui, sans-serif; }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr 1fr; padding: 0 14px 12px; gap: 12px; }
      .divider { padding: 24px 14px 10px; }
      .hero { padding: 56px 20px 40px; }
      .stats { gap: 28px; }
      #map-wrap { padding: 14px; }
      #map { height: 420px; }
      .modal-body { padding: 20px 18px 28px; }
      .info-grid { grid-template-columns: 1fr; }
      .card-name { font-size: 1.15rem; }
    }
    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-eye">Travel Wishlist</div>
  <h1>Places to Go</h1>
  <div class="hero-sub">Our destinations · The plan</div>
  <div class="stats">
    <div class="stat"><div class="stat-n">14</div><div class="stat-l">Destinations</div></div>
    <div class="stat"><div class="stat-n" id="sn-saved">0</div><div class="stat-l">Saved ♡</div></div>
    <div class="stat"><div class="stat-n" id="sn-booked">0</div><div class="stat-l">We're Going ✈</div></div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-all active" onclick="setFilter('all',this)">All</button>
  <button class="btn btn-reg" onclick="setFilter('regular',this)">Regular Trips</button>
  <button class="btn btn-lux" onclick="setFilter('luxury',this)">✦ Luxury</button>
  <div class="sep"></div>
  <button class="btn btn-view active" id="btn-grid" onclick="setView('grid')">Grid</button>
  <button class="btn btn-view" id="btn-map" onclick="setView('map')">Map</button>
</div>

<div id="map-wrap"><div id="map"></div></div>

<div id="grid-sections">
  <div class="divider reg" id="div-reg"><div class="divider-line"></div><div class="divider-label">Regular Trips</div><div class="divider-line"></div></div>
  <div class="grid" id="grid-reg"></div>
  <div class="divider lux" id="div-lux"><div class="divider-line"></div><div class="divider-label">✦ Luxury Dreams</div><div class="divider-line"></div></div>
  <div class="grid" id="grid-lux"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-photo">
      <img id="m-img" src="" alt="">
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="m-flag" id="m-flag"></div>
      <h2 class="m-title" id="m-title"></h2>
      <div class="m-country" id="m-country"></div>
      <p class="m-desc" id="m-desc"></p>
      <div class="info-grid">
        <div class="ib"><div class="ib-label">Budget</div><div class="ib-val" id="m-budget"></div></div>
        <div class="ib"><div class="ib-label">Best Time</div><div class="ib-val" id="m-time"></div></div>
        <div class="ib"><div class="ib-label">Vibe</div><div class="ib-val" id="m-vibe"></div></div>
        <div class="ib"><div class="ib-label">Don't Miss</div><div class="ib-val" id="m-miss"></div></div>
        <div class="ib gold"><div class="ib-label">✈ From Zurich</div><div class="ib-val" id="m-ftime"></div></div>
        <div class="ib gold"><div class="ib-label">Flights from</div><div class="ib-val" id="m-fcost"></div></div>
      </div>
      <div class="hl-label">Highlights</div>
      <ul class="highlights" id="m-hl"></ul>
    </div>
  </div>
</div>

<!-- BOOKING -->
<div id="book-ov" onclick="maybeCloseBook(event)">
  <div class="book-box">
    <div class="book-flag" id="book-flag"></div>
    <div class="book-name" id="book-name"></div>
    <div class="book-sub">When are you going?</div>
    <div class="book-row">
      <select id="book-month">
        <option>Jan</option><option>Feb</option><option>Mar</option><option>Apr</option>
        <option>May</option><option>Jun</option><option>Jul</option><option>Aug</option>
        <option>Sep</option><option>Oct</option><option>Nov</option><option>Dec</option>
      </select>
      <select id="book-year">
        <option>2025</option><option selected>2026</option><option>2027</option>
        <option>2028</option><option>2029</option><option>2030</option>
      </select>
    </div>
    <button class="book-ok" onclick="confirmBook()">Let's go ✈</button>
    <button class="book-no" onclick="closeBook()">Cancel</button>
  </div>
</div>

<footer>Made with wanderlust · ♡ save · ✈ book a date</footer>

let saved  = JSON.parse(localStorage.getItem('tw-saved')  || '[]');
let booked = JSON.parse(localStorage.getItem('tw-booked') || '[]');
let filter = 'all';
let view   = 'grid';
let bookId = null;
let leafMap = null;
let mmarkers = {};

function persist() {
  localStorage.setItem('tw-saved',  JSON.stringify(saved));
  localStorage.setItem('tw-booked', JSON.stringify(booked));
}

function getBooking(id) { return booked.find(b => b.id === id) || null; }
function isSaved(id)    { return saved.includes(id); }

function dots(n) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span class="dot${i > n ? ' off' : ''}"></span>`;
  return h;
}

function render() {
  const showReg = filter === 'all' || filter === 'regular';
  const showLux = filter === 'all' || filter === 'luxury';
  document.getElementById('div-reg').classList.toggle('hidden', !showReg);
  document.getElementById('div-lux').classList.toggle('hidden', !showLux);
  const rg = document.getElementById('grid-reg');
  const lg = document.getElementById('grid-lux');
  rg.innerHTML = ''; lg.innerHTML = '';
  data.forEach(d => {
    if (d.type === 'regular' && showReg) rg.appendChild(mkCard(d));
    if (d.type === 'luxury'  && showLux) lg.appendChild(mkCard(d));
  });
  document.getElementById('sn-saved').textContent  = saved.length;
  document.getElementById('sn-booked').textContent = booked.length;
  if (view === 'map' && leafMap) refreshMarkers();
}

function mkCard(d) {
  const bk = getBooking(d.id);
  const sv = isSaved(d.id);
  const el = document.createElement('div');
  el.className = `card${bk ? ' booked' : ''}`;
  el.innerHTML = `
    <div class="card-photo">
      <img src="${d.img}" alt="${d.name}" loading="lazy">
      <div class="card-photo-overlay"></div>
      ${d.type === 'luxury' ? '<span class="lux-badge">✦ Luxury</span>' : ''}
      <div class="card-photo-text">
        <div class="card-flag-country">${d.flag}&nbsp; ${d.country}</div>
        <div class="card-name">${d.name}</div>
      </div>
      <div class="card-actions">
        <button class="act heart${sv?' on':''}" title="Save" onclick="toggleSave(event,'${d.id}')">${sv ? '♥' : '♡'}</button>
        <button class="act plane${bk?' on':''}" title="Book a date" onclick="openBook(event,'${d.id}')">✈</button>
      </div>
    </div>
    <div class="booked-strip">${bk ? '✈ Going in ' + bk.month + ' ' + bk.year : ''}</div>
    <div class="card-info">
      <div class="budget-dots">${dots(d.budget)}</div>
      <div class="card-time">${d.time}</div>
    </div>`;
  el.addEventListener('click', e => { if (!e.target.closest('.act')) openModal(d); });
  return el;
}

function openModal(d) {
  document.getElementById('m-img').src         = d.img;
  document.getElementById('m-flag').textContent = d.flag;
  document.getElementById('m-title').textContent = d.name;
  document.getElementById('m-country').textContent = d.country + (d.type === 'luxury' ? ' · ✦ Luxury Dream' : '');
  document.getElementById('m-desc').textContent  = d.desc;
  document.getElementById('m-budget').innerHTML  = `<div class="budget-dots" style="margin-bottom:3px">${dots(d.budget)}</div><small>${d.budgetLabel}</small>`;
  document.getElementById('m-time').textContent  = d.time;
  document.getElementById('m-vibe').textContent  = d.vibe;
  document.getElementById('m-miss').textContent  = d.miss;
  document.getElementById('m-ftime').textContent = d.flight.time;
  document.getElementById('m-fcost').textContent = d.flight.cost;
  document.getElementById('m-hl').innerHTML      = d.highlights.map(h => `<li>${h}</li>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function toggleSave(e, id) {
  e.stopPropagation();
  saved = saved.includes(id) ? saved.filter(x => x !== id) : [...saved, id];
  persist(); render();
}

function openBook(e, id) {
  e.stopPropagation();
  const d = data.find(x => x.id === id);
  bookId = id;
  document.getElementById('book-flag').textContent = d.flag;
  document.getElementById('book-name').textContent = d.name;
  const bk = getBooking(id);
  if (bk) { document.getElementById('book-month').value = bk.month; document.getElementById('book-year').value = bk.year; }
  document.getElementById('book-ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function confirmBook() {
  if (!bookId) return;
  const month = document.getElementById('book-month').value;
  const year  = document.getElementById('book-year').value;
  booked = booked.filter(b => b.id !== bookId);
  booked.push({ id: bookId, month, year });
  persist(); closeBook(); render();
}

function closeBook() {
  document.getElementById('book-ov').classList.remove('open');
  document.body.style.overflow = '';
  bookId = null;
}

function maybeCloseBook(e) { if (e.target === document.getElementById('book-ov')) closeBook(); }

function setView(v) {
  view = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-map').classList.toggle('active',  v === 'map');
  document.getElementById('grid-sections').classList.toggle('hidden', v !== 'grid');
  document.getElementById('map-wrap').classList.toggle('visible', v === 'map');
  if (v === 'map') initMap();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.btn-all, .btn-reg, .btn-lux').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function initMap() {
  if (leafMap) { refreshMarkers(); return; }
  leafMap = L.map('map', { center:[25,20], zoom:2 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd', maxZoom:19
  }).addTo(leafMap);
  setTimeout(() => {
    const a = document.querySelector('.leaflet-control-attribution');
    if (a) a.style.cssText = 'font-size:9px;opacity:.5;';
  }, 200);
  refreshMarkers();
}

function refreshMarkers() {
  Object.values(mmarkers).forEach(m => m.remove());
  mmarkers = {};
  const visible = filter === 'all' ? data : data.filter(d => d.type === filter);
  visible.forEach(d => {
    const bk  = getBooking(d.id);
    const cls = bk ? 'pin-bkd' : d.type === 'luxury' ? 'pin-lux' : 'pin-reg';
    const icon = L.divIcon({ html:`<div class="pin ${cls}">${d.flag}</div>`, className:'', iconSize:[40,40], iconAnchor:[20,20] });
    const m = L.marker(d.coords, { icon }).addTo(leafMap);
    m.bindPopup(`
      <div style="font-size:1.2rem;margin-bottom:5px">${d.flag}</div>
      <div style="font-weight:bold;margin-bottom:2px">${d.name}</div>
      <div style="font-size:.68rem;color:#888;text-transform:uppercase;letter-spacing:.08em">${d.country}</div>
      ${bk ? `<div style="margin-top:6px;font-size:.72rem;color:#16a34a;font-family:system-ui">✈ ${bk.month} ${bk.year}</div>` : ''}
    `, { maxWidth:160 });
    m.on('click', () => openModal(d));
    mmarkers[d.id] = m;
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeBook();
  }
});

render();
</script>
